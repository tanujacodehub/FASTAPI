<!DOCTYPE html>
<html>
<head>
    <title>User List</title>
</head>
<link rel="stylesheet" href="/static/style.css">

<body>

<h2>User List</h2>
{% if request.query_params.get("message") %}
<div class="alertBox">
    {{ request.query_params.get("message") }}
</div>
<script>
setTimeout(function() {
    var alert = document.getElementById("alertBox");
    if (alert) {
        alert.style.display = "none";
    }
}, 1000); // 1000 ms = 1 second
</script>
{% endif %}
<table border="1">
<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Action</th>
</tr>

{% for user in users %}
<tr>
<td>{{ loop.index0+1}}</td>
<td>{{ user.name }}</td>
<td>{{ user.email }}</td>
<td>
<a href="/edit/{{ loop.index0 }}" >Edit</a>
<a href="/delete/{{ loop.index0 }}"
onclick="return confirm('Are you sure you want to delete this user?')">
Delete
</a>
</td>
</tr>
{% endfor %}
</table>
<div class="btn-group">   
    <button type="button" class="add-btn" onclick="window.location.href='/add'">Add</button>
</div>
</body>
</html>
